<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>うちの在庫</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F4F1EB">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#F4F1EB; --panel:#fff; --ink:#2C2A26; --subtle:#8C857A; --line:#E7E1D6;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{
  margin:0; background:var(--bg); color:var(--ink); min-height:100vh;
  font-family:'Hiragino Maru Gothic ProN','ヒラギノ丸ゴ ProN',system-ui,-apple-system,'Segoe UI',sans-serif;
}
.wrap{ max-width:560px; margin:0 auto; padding:0 14px 96px; }
header{ padding-top:20px; padding-bottom:12px; }
.titlerow{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
h1{ margin:0; font-size:24px; font-weight:800; }
#syncLabel{ font-size:12px; color:var(--subtle); }
.toolrow{ display:flex; gap:8px; margin-top:12px; }
.ghostbtn{
  border:1.5px solid var(--line); background:#fff; color:var(--subtle);
  border-radius:11px; padding:8px 13px; font-size:13.5px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:transform .15s ease;
}
.ghostbtn:active{ transform:scale(.96); }

nav{ display:flex; gap:8px; overflow-x:auto; padding:4px 0 10px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
nav::-webkit-scrollbar{ display:none; }
.tab{
  flex:0 0 auto; display:flex; align-items:center; gap:6px;
  padding:9px 14px; border-radius:999px; border:1.5px solid var(--line);
  background:#fff; color:var(--ink); font-weight:700; font-size:15px;
  cursor:pointer; font-family:inherit; transition:all .18s ease;
}
.tab .cnt{ font-size:12px; font-weight:700; min-width:18px; text-align:center; padding:1px 6px; border-radius:999px; }
.tab.on{ color:#fff; }
.tab:active{ transform:scale(.96); }

.addbox{
  background:var(--panel); border:1px solid var(--line); border-radius:18px;
  padding:14px; box-shadow:0 2px 8px rgba(0,0,0,.03);
}
.field{
  width:100%; border:1.5px solid var(--line); border-radius:12px;
  padding:12px 14px; font-size:16px; color:var(--ink);
  background:#FCFBF8; outline:none; font-family:inherit;
}
.field:focus{ border-color:#B9B0A0; background:#fff; }
#memoInput{ font-size:14px; margin-top:8px; }
#catPick{ display:none; flex-wrap:wrap; gap:6px; margin-top:10px; }
.catchip{
  border-radius:999px; padding:6px 12px; font-size:13px; font-weight:700;
  border:1.5px solid var(--line); background:#fff; color:var(--ink);
  cursor:pointer; font-family:inherit; transition:all .15s ease;
}
#addBtn{
  margin-top:10px; width:100%; padding:13px 0; border-radius:14px; border:none;
  color:#fff; font-weight:800; font-size:16px; font-family:inherit;
  cursor:pointer; transition:all .15s ease; background:#D9D3C8;
}
#addBtn:active{ transform:scale(.98); }

.histlabel{ font-size:12px; color:var(--subtle); margin:14px 0 8px; }
.chips{ display:flex; flex-wrap:wrap; gap:7px; }
.chipwrap{ display:inline-flex; align-items:center; border-radius:999px; overflow:hidden; }
.chipwrap:active{ transform:scale(.96); }
.chipname{ border:none; background:transparent; cursor:pointer; font-weight:700; font-size:13.5px; padding:6px 4px 6px 12px; font-family:inherit; }
.chipx{ border:none; background:transparent; cursor:pointer; font-size:14px; padding:6px 9px 6px 5px; opacity:.6; font-family:inherit; }

#list{ list-style:none; margin:18px 0 0; padding:0; display:flex; flex-direction:column; gap:10px; }
.card{
  display:flex; align-items:center; gap:12px;
  background:var(--panel); border:1px solid var(--line);
  border-radius:16px; padding:12px 12px 12px 0; overflow:hidden;
  animation:slidein .22s ease;
}
@keyframes slidein{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:none;} }
.bar{ width:6px; align-self:stretch; border-radius:6px; flex:0 0 6px; }
.iname{ font-weight:700; font-size:16px; word-break:break-word; }
.imemo{ font-size:13px; color:var(--subtle); margin-top:2px; word-break:break-word; }
.ifrom{ display:inline-block; font-size:11px; font-weight:700; padding:1px 8px; border-radius:999px; margin-top:4px; }
.body{ flex:1; min-width:0; }
.actbtn{
  flex:0 0 auto; border-radius:11px; padding:8px 12px; font-size:13.5px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all .15s ease;
  border:1.5px solid var(--line); background:#fff; color:var(--subtle);
}
.actbtn:active{ transform:scale(.96); }
.boughtbtn{ border:none; color:#fff; }
.delx{
  flex:0 0 auto; border:none; background:transparent; color:var(--subtle);
  font-size:17px; padding:8px 10px; cursor:pointer; opacity:.55; font-family:inherit;
}

.empty{ text-align:center; padding:32px 16px; color:var(--subtle); }
.empty .emoji{ font-size:34px; margin-bottom:8px; }
.empty .t{ font-weight:700; color:var(--ink); margin-bottom:4px; }

#toast{
  position:fixed; left:50%; bottom:22px; transform:translateX(-50%);
  background:var(--ink); color:#fff; padding:11px 18px; border-radius:999px;
  font-size:14px; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,.22);
  z-index:50; max-width:90%; display:none;
}
@media (prefers-reduced-motion:reduce){ .card{animation:none;} *{transition:none !important;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="titlerow">
      <h1>うちの在庫</h1>
      <span id="syncLabel">接続中…</span>
    </div>
    <div class="toolrow">
      <button class="ghostbtn" id="copyBtn">⧉ テキストで共有</button>
    </div>
  </header>

  <nav id="tabs"></nav>

  <section class="addbox">
    <input class="field" id="nameInput" placeholder="追加するもの" enterkeyhint="done">
    <input class="field" id="memoInput" placeholder="メモ（個数・賞味期限など）任意" enterkeyhint="done">
    <div id="catPick"></div>
    <button id="addBtn">＋ 追加</button>
    <div id="histArea" style="display:none">
      <div class="histlabel">前に追加したもの（タップで再追加）</div>
      <div class="chips" id="chips"></div>
    </div>
  </section>

  <ul id="list"></ul>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// ════════════════════════════════════════════════════════
// ① ここに自分のFirebase設定を貼る（Firebaseコンソール → プロジェクトの設定 → マイアプリ）
// ════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCM-W4kXQ-I4GuTF9yNlZ4ujb9ElIVo-y0",
  authDomain: "zaikokanri-e5933.firebaseapp.com",
  databaseURL: "https://zaikokanri-e5933-default-rtdb.firebaseio.com",
  projectId: "zaikokanri-e5933",
  storageBucket: "zaikokanri-e5933.firebasestorage.app",
  messagingSenderId: "720477353301",
  appId: "1:720477353301:web:00fec55a05711db13cabdc"
};
// ════════════════════════════════════════════════════════

const CATS = [
  { key:"okashi", label:"お菓子",   emoji:"🍪", main:"#E0922E", deep:"#6B4912", soft:"#FBEFD8" },
  { key:"juice",  label:"ジュース", emoji:"🥤", main:"#1E9E9C", deep:"#0E4F4E", soft:"#D8EFEE" },
  { key:"food",   label:"食材系",   emoji:"🥬", main:"#5BA152", deep:"#244A21", soft:"#E1F0DC" },
  { key:"goods",  label:"小物",     emoji:"📦", main:"#7C7BD6", deep:"#2E2D63", soft:"#E7E6FA" },
];
const WISH = { key:"wish", label:"欲しい物", emoji:"🛒", main:"#D9527E", deep:"#7A1C3E", soft:"#FBE2EB" };
const ALLTABS = [...CATS, WISH];

const house = new URLSearchParams(location.search).get("house") || "default";
const ROOT = "pantry/" + house.replace(/[.#$\[\]\/]/g, "_");

let data = emptyData();
let active = "okashi";
let wishCat = "food"; // 欲しい物に直接追加するときのカテゴリ
let db = null;
let toastTimer = null;
let pendingRemove = null; // 「なくなった」を押したアイテムのid（選択待ち）

function emptyData(){
  const d = { items:{}, history:{}, wish:[] };
  CATS.forEach(c => { d.items[c.key]=[]; d.history[c.key]=[]; });
  return d;
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
const $ = id => document.getElementById(id);
const catOf = key => CATS.find(c=>c.key===key) || CATS[2];

// ── Firebase ──
function initFirebase(){
  if (typeof firebase === "undefined") {
    $("syncLabel").textContent = "SDK読込失敗";
    flash("Firebase SDKを読み込めませんでした。Claudeのプレビュー内ではなく、ファイルを保存してブラウザで直接開いてください。");
    return;
  }
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    db.ref(ROOT).on("value", snap => {
      data = normalize(snap.val());
      $("syncLabel").textContent = "同期 " + new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
      render();
    }, err => { $("syncLabel").textContent = "接続エラー"; console.error(err); });
    db.ref(".info/connected").on("value", s => {
      if (s.val() === false) $("syncLabel").textContent = "オフライン";
    });
  } catch(e) { $("syncLabel").textContent = "設定エラー"; console.error(e); }
}

function normalize(v){
  const base = emptyData();
  if (!v) return base;
  CATS.forEach(c => {
    const it = v.items && v.items[c.key];
    base.items[c.key] = it ? Object.values(it) : [];
    base.items[c.key].sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
    const h = v.history && v.history[c.key];
    base.history[c.key] = h ? Object.values(h).sort((a,b)=>(b.t||0)-(a.t||0)).map(x=>x.name) : [];
  });
  base.wish = v.wish ? Object.values(v.wish) : [];
  base.wish.sort((a,b)=>(b.t||0)-(a.t||0));
  return base;
}
function keyOf(name){ return encodeURIComponent(name).replace(/[.#$\[\]\/%]/g,"_"); }

// ── 書き込み（差分更新）──
function update(up){
  if (db) firebase.database().ref().update(up);
}
// 在庫に追加
function addStock(catKey, name, memo){
  const id = uid();
  const item = { id, name, memo: memo||"", addedAt: Date.now() };
  if (!db) { data.items[catKey].unshift(item); data.history[catKey]=data.history[catKey].filter(h=>h!==name); render(); return; }
  const up = {};
  up[ROOT+"/items/"+catKey+"/"+id] = item;
  up[ROOT+"/history/"+catKey+"/"+keyOf(name)] = null;
  // 同名が欲しい物にあれば消しておく
  data.wish.filter(w=>w.name===name).forEach(w=>{ up[ROOT+"/wish/"+w.id]=null; });
  update(up);
}
// なくなった: 在庫 → 欲しい物へ移動
function ranOut(catKey, item){
  const wid = uid();
  const wish = { id:wid, name:item.name, memo:item.memo||"", cat:catKey, t:Date.now() };
  if (!db) {
    data.items[catKey]=data.items[catKey].filter(i=>i.id!==item.id);
    data.wish.unshift(wish); render(); return;
  }
  const up = {};
  up[ROOT+"/items/"+catKey+"/"+item.id] = null;
  up[ROOT+"/wish/"+wid] = wish;
  update(up);
}
// 消す: 在庫 → 履歴へ（欲しい物には入れない）
function deleteStock(catKey, item){
  if (!db) {
    data.items[catKey]=data.items[catKey].filter(i=>i.id!==item.id);
    data.history[catKey]=[item.name, ...data.history[catKey].filter(h=>h!==item.name)].slice(0,30);
    render(); return;
  }
  const up = {};
  up[ROOT+"/items/"+catKey+"/"+item.id] = null;
  up[ROOT+"/history/"+catKey+"/"+keyOf(item.name)] = { name:item.name, t:Date.now() };
  update(up);
}
// 買った: 欲しい物 → 元カテゴリの在庫へ
function bought(w){
  const catKey = w.cat || "food";
  const id = uid();
  const item = { id, name:w.name, memo:w.memo||"", addedAt:Date.now() };
  if (!db) {
    data.wish=data.wish.filter(x=>x.id!==w.id);
    data.items[catKey].unshift(item); render(); return;
  }
  const up = {};
  up[ROOT+"/wish/"+w.id] = null;
  up[ROOT+"/items/"+catKey+"/"+id] = item;
  up[ROOT+"/history/"+catKey+"/"+keyOf(w.name)] = null;
  update(up);
}
// 欲しい物に直接追加
function addWish(name, memo, catKey){
  const id = uid();
  const wish = { id, name, memo:memo||"", cat:catKey, t:Date.now() };
  if (!db) { data.wish.unshift(wish); render(); return; }
  const up = {};
  up[ROOT+"/wish/"+id] = wish;
  update(up);
}
// 欲しい物から削除（買わないことにした）→ 履歴へ
function dropWish(w){
  const catKey = w.cat || "food";
  if (!db) {
    data.wish=data.wish.filter(x=>x.id!==w.id);
    data.history[catKey]=[w.name, ...data.history[catKey].filter(h=>h!==w.name)].slice(0,30);
    render(); return;
  }
  const up = {};
  up[ROOT+"/wish/"+w.id] = null;
  up[ROOT+"/history/"+catKey+"/"+keyOf(w.name)] = { name:w.name, t:Date.now() };
  update(up);
}
function clearHist(catKey, name){
  if (!db) { data.history[catKey]=data.history[catKey].filter(h=>h!==name); render(); return; }
  firebase.database().ref(ROOT+"/history/"+catKey+"/"+keyOf(name)).remove();
}

// ── UI ──
function addFromForm(){
  const nm = $("nameInput").value.trim();
  if (!nm) return;
  const memo = $("memoInput").value.trim();
  if (active === "wish") {
    addWish(nm, memo, wishCat);
    flash("「"+nm+"」を欲しい物に追加");
  } else {
    addStock(active, nm, memo);
    flash("「"+nm+"」を追加");
  }
  $("nameInput").value=""; $("memoInput").value="";
  updateAddBtn();
}
function flash(msg){
  const t = $("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.display="none"; }, msg.length > 30 ? 6000 : 1800);
}
function activeTabDef(){ return active==="wish" ? WISH : catOf(active); }
function updateAddBtn(){
  const c = activeTabDef();
  const has = $("nameInput").value.trim().length > 0;
  const b = $("addBtn");
  b.style.background = has ? c.main : "#D9D3C8";
  b.style.boxShadow = has ? "0 4px 14px "+c.main+"66" : "none";
}

function render(){
  const cur = activeTabDef();

  // タブ
  const tabs = $("tabs");
  tabs.innerHTML = "";
  ALLTABS.forEach(c=>{
    const on = c.key === active;
    const count = c.key==="wish" ? data.wish.length : data.items[c.key].length;
    const b = document.createElement("button");
    b.className = "tab" + (on?" on":"");
    if (on){ b.style.background=c.main; b.style.borderColor=c.main; b.style.boxShadow="0 4px 12px "+c.main+"40"; }
    b.innerHTML = `<span style="font-size:16px">${c.emoji}</span>${c.label}
      <span class="cnt" style="background:${on?"rgba(255,255,255,.25)":c.soft};color:${on?"#fff":c.deep}">${count}</span>`;
    b.onclick = ()=>{ active=c.key; pendingRemove=null; render(); updateAddBtn(); };
    tabs.appendChild(b);
  });

  $("nameInput").placeholder = active==="wish" ? "欲しい物を追加" : cur.label + "に追加するもの";

  // 欲しい物タブのみ: カテゴリ選択チップ
  const cp = $("catPick");
  if (active === "wish") {
    cp.style.display = "flex";
    cp.innerHTML = "";
    CATS.forEach(c=>{
      const on = c.key === wishCat;
      const b = document.createElement("button");
      b.className = "catchip";
      b.textContent = c.emoji + " " + c.label;
      if (on){ b.style.background=c.soft; b.style.borderColor=c.main; b.style.color=c.deep; }
      b.onclick = ()=>{ wishCat=c.key; render(); };
      cp.appendChild(b);
    });
  } else {
    cp.style.display = "none";
  }

  // 履歴チップ（在庫タブのみ）
  if (active !== "wish") {
    const inStock = new Set(data.items[active].map(i=>i.name));
    const inWish = new Set(data.wish.map(w=>w.name));
    const hist = data.history[active].filter(h=>!inStock.has(h) && !inWish.has(h)).slice(0,18);
    $("histArea").style.display = hist.length ? "block" : "none";
    const chips = $("chips");
    chips.innerHTML = "";
    hist.forEach(h=>{
      const w = document.createElement("span");
      w.className = "chipwrap";
      w.style.border = "1.5px solid "+cur.main;
      w.style.background = cur.soft;
      const nb = document.createElement("button");
      nb.className = "chipname"; nb.style.color = cur.deep; nb.textContent = h;
      nb.onclick = ()=>{ addStock(active, h, ""); flash("「"+h+"」を再追加"); };
      const xb = document.createElement("button");
      xb.className = "chipx"; xb.style.color = cur.main; xb.textContent = "×";
      xb.setAttribute("aria-label","履歴から削除");
      xb.onclick = ()=> clearHist(active, h);
      w.appendChild(nb); w.appendChild(xb);
      chips.appendChild(w);
    });
  } else {
    $("histArea").style.display = "none";
  }

  // リスト
  const list = $("list");
  list.innerHTML = "";

  if (active === "wish") {
    if (data.wish.length === 0){
      list.innerHTML = `<div class="empty"><div class="emoji">🛒</div>
        <div class="t">欲しい物はありません</div>
        <div style="font-size:14px">在庫で「なくなった」を押すとここに入ります</div></div>`;
      return;
    }
    data.wish.forEach(w=>{
      const c = catOf(w.cat);
      const li = document.createElement("li");
      li.className = "card";
      const bar = document.createElement("span");
      bar.className = "bar"; bar.style.background = WISH.main;
      const body = document.createElement("div");
      body.className = "body";
      const nm = document.createElement("div");
      nm.className = "iname"; nm.textContent = w.name;
      body.appendChild(nm);
      if (w.memo){
        const mm = document.createElement("div");
        mm.className = "imemo"; mm.textContent = w.memo;
        body.appendChild(mm);
      }
      const fr = document.createElement("span");
      fr.className = "ifrom";
      fr.style.background = c.soft; fr.style.color = c.deep;
      fr.textContent = c.emoji + " " + c.label;
      body.appendChild(fr);
      const bb = document.createElement("button");
      bb.className = "actbtn boughtbtn";
      bb.style.background = WISH.main;
      bb.style.boxShadow = "0 3px 10px "+WISH.main+"55";
      bb.textContent = "買った";
      bb.onclick = ()=>{ bought(w); flash("「"+w.name+"」を"+c.label+"の在庫へ"); };
      const dx = document.createElement("button");
      dx.className = "delx"; dx.textContent = "×";
      dx.setAttribute("aria-label","欲しい物から削除");
      dx.onclick = ()=>{ dropWish(w); flash("「"+w.name+"」を削除（履歴に残しました）"); };
      li.appendChild(bar); li.appendChild(body); li.appendChild(bb); li.appendChild(dx);
      list.appendChild(li);
    });
    return;
  }

  const items = data.items[active];
  if (items.length === 0){
    list.innerHTML = `<div class="empty"><div class="emoji">${cur.emoji}</div>
      <div class="t">まだ何もありません</div>
      <div style="font-size:14px">上の欄から${cur.label}を追加してみましょう</div></div>`;
    return;
  }
  items.forEach(it=>{
    const li = document.createElement("li");
    li.className = "card";
    const bar = document.createElement("span");
    bar.className = "bar"; bar.style.background = cur.main;
    const body = document.createElement("div");
    body.className = "body";
    const nm = document.createElement("div");
    nm.className = "iname"; nm.textContent = it.name;
    body.appendChild(nm);
    if (it.memo){
      const mm = document.createElement("div");
      mm.className = "imemo"; mm.textContent = it.memo;
      body.appendChild(mm);
    }
    const rmArea = document.createElement("div");
    rmArea.style.cssText = "flex:0 0 auto; display:flex; gap:6px; align-items:center;";
    if (pendingRemove === it.id) {
      const toWish = document.createElement("button");
      toWish.className = "actbtn boughtbtn";
      toWish.style.background = WISH.main;
      toWish.textContent = "🛒 欲しい物へ";
      toWish.onclick = ()=>{ pendingRemove=null; ranOut(active, it); flash("「"+it.name+"」を欲しい物へ"); };
      const del = document.createElement("button");
      del.className = "actbtn";
      del.style.borderColor = "#D9534F"; del.style.color = "#D9534F";
      del.textContent = "消す";
      del.onclick = ()=>{ pendingRemove=null; deleteStock(active, it); flash("「"+it.name+"」を削除（履歴に残しました）"); };
      const cancel = document.createElement("button");
      cancel.className = "delx"; cancel.textContent = "×";
      cancel.setAttribute("aria-label","キャンセル");
      cancel.onclick = ()=>{ pendingRemove=null; render(); };
      rmArea.appendChild(toWish); rmArea.appendChild(del); rmArea.appendChild(cancel);
    } else {
      const rm = document.createElement("button");
      rm.className = "actbtn"; rm.textContent = "なくなった";
      rm.onclick = ()=>{ pendingRemove=it.id; render(); };
      rmArea.appendChild(rm);
    }
    li.appendChild(bar); li.appendChild(body); li.appendChild(rmArea);
    list.appendChild(li);
  });
}

// ── テキスト共有 ──
$("copyBtn").onclick = async ()=>{
  const lines = ["【うちの在庫】"];
  CATS.forEach(c=>{
    const arr = data.items[c.key];
    if (!arr.length) return;
    lines.push("", c.emoji+" "+c.label);
    arr.forEach(it=> lines.push("・"+it.name+(it.memo?"（"+it.memo+"）":"")));
  });
  if (data.wish.length){
    lines.push("", "🛒 欲しい物（買う物リスト）");
    data.wish.forEach(w=>{
      const c = catOf(w.cat);
      lines.push("・"+w.name+(w.memo?"（"+w.memo+"）":"")+"［"+c.label+"］");
    });
  }
  lines.push("", "更新: "+new Date().toLocaleString("ja-JP"));
  try {
    await navigator.clipboard.writeText(lines.join("\n"));
    flash("テキストをコピーしました（LINE等に貼り付けOK）");
  } catch { flash("コピーできませんでした"); }
};

$("addBtn").onclick = addFromForm;
$("nameInput").addEventListener("input", updateAddBtn);
$("nameInput").addEventListener("keydown", e=>{ if(e.key==="Enter") addFromForm(); });
$("memoInput").addEventListener("keydown", e=>{ if(e.key==="Enter") addFromForm(); });

render();
updateAddBtn();
initFirebase();
</script>
